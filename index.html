<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تِرياقي - لوحة التحكم</title>
    <link rel="icon" type="image/png" href="logotregy.png">
    <!-- jsPDF Libraries (Loaded Locally) -->
    <script src="assets/js/jspdf.umd.min.js"></script>
    <script>window.jsPDF = window.jspdf.jsPDF;</script>
    <script src="assets/js/jspdf.plugin.autotable.min.js"></script>

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Tajawal', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0d9488 0%, #065f46 50%, #064e3b 100%);
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* تأثير النبض الأحمر للفائت */
        .pulse-alert {
            animation: pulse-red 2s infinite;
            border-radius: 12px;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(241, 245, 249, 0.5);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    <!-- Auth Guard: must be in <head> to block rendering before redirect -->
    <script src="api-config.js"></script>
    <script src="auth.js"></script>
    <script>
        if (!isAuthenticated()) {
            document.documentElement.style.display = 'none';
            window.location.replace('landing.html');
        }
    </script>
</head>

<body class="h-full gradient-bg overflow-auto">

    <div class="min-h-full w-full px-4 sm:px-8">

        <!-- ══════════════ DASHBOARD HEADER ══════════════ -->
        <header class="max-w-7xl mx-auto py-6 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center gap-4">
                <div class="w-20 h-20 rounded-2xl bg-white/20 flex items-center justify-center float-animation">
                    <img src="logotregy.png" alt="Teryaqi Logo" class="w-20 h-20 object-contain">
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-white">تِرياقي</h1>
                    <p class="text-emerald-200 text-sm">نظام مراقبة الدواء الذكي</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <!-- Sensor Status -->
                <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full border border-white/20">
                    <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                    <span class="text-white text-sm font-medium">المستشعر متصل</span>
                </div>

                <!-- Patient Greeting -->
                <div id="user-greeting"
                    class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full border border-white/20">
                    <span class="text-white text-sm font-bold">👋</span>
                    <span id="greeting-name" class="text-white text-sm font-medium"></span>
                </div>



                <!-- Report Button -->
                <button type="button" onclick="openReportModal()"
                    class="px-6 py-2 rounded-xl bg-white/20 text-white text-sm font-bold border border-white/30 hover:bg-white/30 transition-all flex items-center gap-2">
                    📄 تقرير طبي
                </button>

                <!-- Notifications Link -->
                <a href="medications_list.html"
                    class="px-6 py-2 rounded-xl bg-white/20 text-white text-sm font-bold border border-white/30 hover:bg-white/30 transition-all flex items-center gap-2">
                    مركز التنبيهات 🔔
                </a>

                <!-- Logout Button -->
                <button type="button" id="btn-logout" onclick="logoutUser()"
                    class="px-4 py-2 rounded-xl bg-red-500/20 text-red-100 text-sm font-bold border border-red-300/30 hover:bg-red-500/40 transition">
                    خروج
                </button>
            </div>
        </header>

        <!-- ══════════════ KPI CARDS ══════════════ -->
        <section class="max-w-7xl mx-auto mb-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card-glass rounded-2xl p-5 shadow-xl flex items-center justify-between">
                <div>
                    <p class="text-gray-500 text-sm">إجمالي الأدوية</p>
                    <p id="total-medicines" class="text-3xl font-bold text-gray-800">0</p>
                </div>
                <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-xl">📋</div>
            </div>
            <div class="card-glass rounded-2xl p-5 shadow-xl flex items-center justify-between text-green-600">
                <div>
                    <p class="text-gray-500 text-sm">تم تناوله</p>
                    <p id="taken-count" class="text-3xl font-bold">0</p>
                </div>
                <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <div class="card-glass rounded-2xl p-5 shadow-xl flex items-center justify-between text-amber-600">
                <div>
                    <p class="text-gray-500 text-sm">في الانتظار</p>
                    <p id="pending-count" class="text-3xl font-bold">0</p>
                </div>
                <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                            d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
            <div class="card-glass rounded-2xl p-5 shadow-xl flex items-center justify-between text-red-600">
                <div>
                    <p class="text-gray-500 text-sm">فائت</p>
                    <p id="missed-count" class="text-3xl font-bold">0</p>
                </div>
                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center pulse-alert">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
            </div>
        </section>

        <!-- ══════════════ MAIN CONTENT ══════════════ -->
        <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 pb-12">

            <!-- Add Medication Form -->
            <div class="lg:col-span-1">
                <div class="card-glass rounded-3xl p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">إضافة دواء جديد</h2>
                    <form id="medicine-form" class="space-y-4">
                        <input type="text" id="patient-name"
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all"
                            placeholder="ملاحظة محلية (اختياري)">
                        <input list="medicine-options" id="medicine-name" required
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all"
                            placeholder="اكتب اسم الدواء">
                        <datalist id="medicine-options"></datalist>
                        <input type="text" id="dosage" required
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all"
                            placeholder="مثال: حبة واحدة - 500 ملغ">
                        <input type="time" id="medicine-time" required
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all">
                        <select id="disease-type"
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all text-sm font-medium text-gray-700">
                            <option value="" disabled selected>-- اختر الحالة المرضية --</option>
                            <option value="ضغط الدم">مرض ضغط الدم</option>
                            <option value="خمول الغدة">خمول الغدة الدرقية</option>
                            <option value="هشاشة العظام"> هشاشة العظام</option>
                            <option value="الكوليسترول"> ارتفاع الكوليسترول</option>
                            <option value="سيولة الدم"> أمراض سيولة الدم</option>
                            <option value="السكري"> المرض السكري النوع الثاني</option>
                            <option value="عام">أخرى / عام</option>
                        </select>
                        <textarea id="personal-notes"
                            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none transition-all text-sm"
                            placeholder="اكتب تعليمات الطبيب أو ملاحظاتك هنا..." rows="3"></textarea>
                        <button type="submit"
                            class="w-full py-4 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold shadow-lg transition-all transform hover:-translate-y-1">إضافة
                            الدواء</button>
                    </form>
                </div>
            </div>

            <!-- Medication Schedule -->
            <div class="lg:col-span-2 space-y-6">
                <div class="card-glass rounded-3xl p-6 shadow-xl min-h-[400px] w-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-6 flex justify-between items-center">
                        <span>📅 جدول الأدوية والمراقبة</span>
                        <span class="text-xs font-normal text-gray-400 italic">تحديث مباشر</span>
                    </h2>

                    <div id="medicines-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        <div id="empty-state" class="text-center py-20 flex flex-col items-center gap-4">
                            <div class="text-6xl opacity-20">📋</div>
                            <p class="text-gray-400 font-medium">لا توجد أدوية مسجلة حالياً</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ══════════════ FOOTER ══════════════ -->
        <footer class="max-w-7xl mx-auto py-8 text-center border-t border-white/10">
            <p class="text-emerald-100 text-sm opacity-80"> 2026 تِرياقي - جميع الحقوق محفوظة</p>
        </footer>

        <!-- Error Display -->
        <p id="api-error"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 text-sm text-red-100 font-bold bg-red-600/90 px-6 py-3 rounded-2xl shadow-xl hidden z-50">
        </p>
    </div>



    <!-- Report Modal -->
    <div id="report-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-extrabold text-gray-800">📄 إنشاء تقرير طبي</h3>
                <button onclick="closeReportModal()"
                    class="w-8 h-8 rounded-xl bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200 transition">✕</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 mb-1 block">نطاق التقرير</label>
                    <select id="report-filter"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-emerald-500 outline-none text-sm font-medium">
                        <option value="all">جميع الأدوية</option>
                    </select>
                </div>
                <button type="button" id="btn-generate-report" onclick="generateDynamicPDF()"
                    class="w-full py-4 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold shadow-lg transition-all transform hover:-translate-y-1">
                    تحميل التقرير (PDF)
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
